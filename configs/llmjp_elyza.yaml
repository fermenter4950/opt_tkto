# 最適化 LLM-jp + 採点 Elyza
run:
  output_dir: result
  timestamp_dir: true   # 実行開始時刻 YYYYMMDD_HHMMSS でサブフォルダ作成
  # run_id: "20260621_235500"  # 再開時は既存 run を指定（timestamp_dir は無視）

optimizer:
  model: llm-jp-4-8b-thinking
  reasoning_effort: low
  max_new_tokens: 1024
  temperature: 0.0
  do_sample: false
  length_penalty: 1.2
  num_beams: 4

scorer:
  type: llm
  model: elyza
  # raw.csv 学習 pos/neg（旧: models/scorer_elyza_lora_twitter）
  adapter_path: models/scorer_elyza_raw_posneg

tkto:
  n_iter: 2
  batch_size: 180
  num_of_output: 1
  initial_epoch: 0
  initial_step: 0

kto:
  # split: analysis→prompt（loss マスク）, final→completion（推奨）
  # joint: analysis+final 全文を completion（Pattern 1）
  harmony_format: split
  max_steps: 40
  save_steps: 10
  # Harmony prompt は ~470 tok。384 だと completion が丸ごと切れるため 1024 以上にする
  max_length: 1024
  learning_rate: 5.0e-5
  beta: 0.1
  min_valid_ratio: 0.0
  one_epoch: true

data:
  messages_csv: data/message_180.tsv
  message_column: メッセージ